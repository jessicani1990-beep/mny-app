<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="apple-touch-icon" href="./icon.png?v=20">
<link rel="manifest" href="manifest.json?v=20">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="倪光家計簿">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>倪光雲端家計簿</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f3f0; color: #4a4541; -webkit-tap-highlight-color: transparent; }
    .card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .btn-primary { background-color: #8a9a89; color: white; transition: 0.3s; font-weight: 700; }
    .btn-primary:active { background-color: #6d7a6c; transform: scale(0.98); }
    .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
    .nav-active { color: #7a8a79; font-weight: 700; border-top: 2px solid #7a8a79; }
    .stat-box { background: #fdfcfb; border-radius: 12px; padding: 14px; border-left: 5px solid #8a9a89; border-top: 1px solid #eee; }
    .chart-container { position: relative; height: 220px; width: 100%; }
    select, input { background-color: transparent !important; }

    /* 分類標籤篩選器 */
    .cat-tag {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        border: 1.5px solid #c7c2bd;
        color: #7a736d;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        user-select: none;
    }
    .cat-tag.active {
        background-color: #8a9a89;
        border-color: #8a9a89;
        color: white;
    }
    .cat-tag:active { transform: scale(0.95); }

    /* 歷史頁篩選區 */
    .filter-bar {
        background: white;
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        border: 1px solid #ede9e5;
        margin-bottom: 20px;
    }
</style>
</head>
<body class="pb-24">

<!-- 全域載入動畫 -->
<div id="loading" class="loading font-bold text-stone-500">
    <div class="mb-2">⏳</div>
    <span>雲端同步中...</span>
</div>

<!-- 底部導覽列 -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around p-2 z-50">
    <button onclick="showPage('add')" id="nav-add" class="flex flex-col items-center p-2 nav-active text-xs"><span>🖋️</span>記帳</button>
    <button onclick="showPage('history')" id="nav-history" class="flex flex-col items-center p-2 text-gray-500 text-xs"><span>📜</span>紀錄</button>
    <button onclick="showPage('chart')" id="nav-chart" class="flex flex-col items-center p-2 text-gray-500 text-xs"><span>📊</span>分析</button>
    <button onclick="showPage('setting')" id="nav-setting" class="flex flex-col items-center p-2 text-gray-500 text-xs"><span>⚙️</span>設定</button>
</nav>

<!-- 第一頁：新增紀錄 -->
<div id="page-add" class="p-6">
    <h2 class="text-lg font-bold mb-6 tracking-widest text-center">生活記帳簿</h2>
    <div class="card p-6 space-y-5">
        <div class="flex justify-between border-b border-stone-300 pb-2 text-sm font-bold">
            <input type="date" id="date" class="outline-none bg-transparent">
            <span class="text-stone-600 uppercase"><span id="display-user">倪</span> · <span id="display-type">家用</span></span>
        </div>
        
        <div class="flex gap-4">
            <div class="flex-1">
                <label class="text-[10px] font-bold text-stone-500 uppercase">紀錄者</label>
                <select id="user" onchange="updateDisplay()" class="w-full border-b py-2 text-sm outline-none">
                    <option value="倪">倪</option>
                    <option value="光">光</option>
                </select>
            </div>
            <div class="flex-1">
                <label class="text-[10px] font-bold text-stone-500 uppercase">屬性</label>
                <select id="type" onchange="updateDisplay()" class="w-full border-b py-2 text-sm outline-none">
                    <option value="家用">家用</option>
                    <option value="個人">個人</option>
                </select>
            </div>
        </div>

        <div>
            <label class="text-[10px] font-bold text-stone-500 uppercase">金額</label>
            <input type="number" id="amount" inputmode="numeric" placeholder="0" class="w-full border-b py-2 text-3xl font-bold outline-none text-stone-800">
        </div>

        <div class="flex gap-4">
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-stone-500 uppercase">項目</label>
                <input type="text" id="item" placeholder="細節描述" class="w-full border-b py-2 text-sm outline-none">
            </div>
            <div class="w-1/2">
                <label class="text-[10px] font-bold text-stone-500 uppercase">分類</label>
                <select id="category" class="w-full border-b py-2 text-sm outline-none">
                    <option value="飲食">飲食</option>
                    <option value="日常">日常</option>
                    <option value="交通">交通</option>
                    <option value="醫療">醫療</option>
                    <option value="娛樂">娛樂</option>
                    <option value="治裝">治裝</option>
                    <option value="保險">保險</option>
                    <option value="寵物">寵物</option>
                    <option value="運動">運動</option>
                    <option value="其他">其他</option>
                </select>
            </div>
        </div>

        <button onclick="submitData()" class="w-full btn-primary p-4 rounded-full mt-6 tracking-widest text-sm shadow-md">同步至雲端帳簿</button>
    </div>
</div>

<!-- 第二頁：歷史紀錄 -->
<div id="page-history" class="hidden p-6">
    <h2 class="text-lg font-bold mb-4 tracking-widest text-center">歷史帳項</h2>

    <!-- ★ 新增：日期篩選器 -->
    <div class="filter-bar">
        <p class="text-[9px] font-bold text-stone-400 uppercase tracking-widest mb-2">日期區間</p>
        <div class="flex items-center gap-2">
            <input type="date" id="hist-start" onchange="renderHistory()" class="flex-1 text-xs border-b border-stone-200 py-1 outline-none text-stone-700">
            <span class="text-xs text-stone-300 font-bold">—</span>
            <input type="date" id="hist-end" onchange="renderHistory()" class="flex-1 text-xs border-b border-stone-200 py-1 outline-none text-stone-700">
        </div>
        <div class="flex justify-end mt-2">
            <button onclick="resetHistFilter()" class="text-[10px] text-stone-400 underline">重設</button>
        </div>
    </div>

    <div id="history-list" class="space-y-4"></div>
</div>

<!-- 第三頁：分析報告 -->
<div id="page-chart" class="hidden p-6 text-stone-700">
    <h2 class="text-lg font-bold mb-4 tracking-widest text-center">收支分析</h2>
    
    <div class="flex items-center justify-between gap-2 mb-6 bg-white p-3 rounded-xl shadow-sm border border-stone-200">
        <input type="date" id="start-date" onchange="renderChart()" class="text-xs outline-none bg-transparent">
        <span class="text-xs text-stone-400">至</span>
        <input type="date" id="end-date" onchange="renderChart()" class="text-xs outline-none bg-transparent">
    </div>

    <div class="grid grid-cols-2 gap-3 mb-8 font-bold text-center">
        <div class="stat-box"><p class="text-[9px] text-stone-500 uppercase">倪 · 家用</p><p class="text-sm" id="stat-ni-home">$0</p></div>
        <div class="stat-box"><p class="text-[9px] text-stone-500 uppercase">倪 · 個人</p><p class="text-sm" id="stat-ni-self">$0</p></div>
        <div class="stat-box border-l-stone-400"><p class="text-[9px] text-stone-500 uppercase">光 · 家用</p><p class="text-sm" id="stat-guang-home">$0</p></div>
        <div class="stat-box border-l-stone-400"><p class="text-[9px] text-stone-500 uppercase">光 · 個人</p><p class="text-sm" id="stat-guang-self">$0</p></div>
    </div>

    <div class="space-y-6">
        <div class="card p-4">
            <h3 class="text-[11px] font-bold text-center mb-3 text-stone-500 uppercase tracking-widest">● 全家 · 家用花費</h3>
            <div class="chart-container"><canvas id="homeChart"></canvas></div>
        </div>
        <div class="card p-4">
            <h3 class="text-[11px] font-bold text-center mb-3 text-stone-500 uppercase tracking-widest">● 倪 · 個人花費</h3>
            <div class="chart-container"><canvas id="niChart"></canvas></div>
        </div>
        <div class="card p-4">
            <h3 class="text-[11px] font-bold text-center mb-3 text-stone-500 uppercase tracking-widest">● 光 · 個人花費</h3>
            <div class="chart-container"><canvas id="guangChart"></canvas></div>
        </div>
    </div>

    <div class="mt-8">
        <h3 class="text-xs font-bold text-stone-500 mb-3 tracking-widest border-l-4 border-stone-400 pl-2 uppercase">Big Expenses (&gt; $1,000)</h3>
        <div id="big-list" class="space-y-1"></div>

        <div class="mt-8 pb-10">
            <h3 class="text-xs font-bold text-stone-500 mb-3 tracking-widest border-l-4 border-stone-400 pl-2 uppercase">Full Details (All Entries)</h3>

            <!-- ★ 新增：分類篩選標籤 -->
            <div class="mb-3">
                <p class="text-[9px] font-bold text-stone-400 uppercase tracking-widest mb-2">分類篩選</p>
                <div id="cat-filter-tags" class="flex flex-wrap gap-2">
                    <!-- 由 JS 動態產生 -->
                </div>
            </div>

            <div id="full-detail-list" class="space-y-2"></div>
        </div>
    </div>
</div>

<!-- 第四頁：設定 -->
<div id="page-setting" class="hidden p-6 text-center">
    <h2 class="text-lg font-bold mb-6 tracking-widest text-center">系統設定</h2>
    <div class="card p-8">
        <p class="text-[10px] text-stone-400 mb-4 tracking-widest">目前資料儲存於 Google 試算表</p>
        <button onclick="fetchData()" class="w-full py-4 bg-stone-700 text-white rounded-full text-sm font-bold shadow-md active:scale-95 transition-all">🔄 立即強制同步雲端</button>
    </div>
</div>

<script>
// ======= Service Worker =======
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
            .then(function(reg) { console.log('App 服務啟動成功'); })
            .catch(function(err) { console.log('服務啟動失敗', err); });
    });
}

// ======= 請在此處替換您的 GAS URL =======
var GAS_URL = "https://script.google.com/macros/s/AKfycbw4f7HKvhbqqQZrRMj3fKLFYnk9Mu7Oh_3xLr2aIu_mQikCDeGjsys8qyNKggy4ZWRO/exec";
// ======================================

var db = [];
var charts = { home: null, ni: null, guang: null };

// ★ 分類清單（與記帳頁一致）
var ALL_CATEGORIES = ['飲食','日常','交通','醫療','娛樂','治裝','保險','寵物','運動','其他'];

// ★ 目前選取的 Full Details 分類篩選（空陣列 = 全部）
var selectedCats = [];

// ======= 初始化分類標籤 =======
function initCatTags() {
    var container = document.getElementById('cat-filter-tags');
    // 「全部」標籤
    var allTag = document.createElement('span');
    allTag.className = 'cat-tag active';
    allTag.dataset.cat = '__all__';
    allTag.textContent = '全部';
    allTag.onclick = function() { toggleCatTag('__all__'); };
    container.appendChild(allTag);

    ALL_CATEGORIES.forEach(function(cat) {
        var tag = document.createElement('span');
        tag.className = 'cat-tag';
        tag.dataset.cat = cat;
        tag.textContent = cat;
        tag.onclick = function() { toggleCatTag(cat); };
        container.appendChild(tag);
    });
}

function toggleCatTag(cat) {
    if (cat === '__all__') {
        selectedCats = [];
    } else {
        var idx = selectedCats.indexOf(cat);
        if (idx >= 0) {
            selectedCats.splice(idx, 1);
        } else {
            selectedCats.push(cat);
        }
    }
    // 更新標籤樣式
    var tags = document.querySelectorAll('#cat-filter-tags .cat-tag');
    tags.forEach(function(tag) {
        var c = tag.dataset.cat;
        if (c === '__all__') {
            tag.className = 'cat-tag' + (selectedCats.length === 0 ? ' active' : '');
        } else {
            tag.className = 'cat-tag' + (selectedCats.indexOf(c) >= 0 ? ' active' : '');
        }
    });
    renderFullDetails();
}

// ======= 工具函數：安全取得日期字串 YYYY-MM-DD =======
function safeDate(val) {
    if (!val) return '';
    var s = String(val);
    s = s.split('T')[0];
    s = s.substring(0, 10);
    s = s.replace(/\//g, '-');
    return s;
}

// ======= 取得今天與本月第一天 =======
function getTodayStr() {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
}

function getFirstDayOfMonthStr() {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    return y + '-' + m + '-01';
}

// ======= 從雲端抓取資料 =======
function fetchData() {
    document.getElementById('loading').style.display = 'flex';
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "get" }) })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            db = data;
            db.sort(function(a, b) {
                var da = safeDate(a.date);
                var db2 = safeDate(b.date);
                if (db2 > da) return 1;
                if (db2 < da) return -1;
                return Number(b.id) - Number(a.id);
            });
            renderHistory();
            renderChart();
            document.getElementById('loading').style.display = 'none';
        })
        .catch(function(e) {
            console.error("Fetch error:", e);
            alert("同步失敗，請檢查網路連線或 GAS 設定");
            document.getElementById('loading').style.display = 'none';
        });
}

// ======= 提交資料到雲端 =======
function submitData() {
    var entry = {
        action: "add",
        id: Date.now(),
        date: document.getElementById('date').value,
        user: document.getElementById('user').value,
        type: document.getElementById('type').value,
        amount: parseFloat(document.getElementById('amount').value) || 0,
        item: document.getElementById('item').value,
        category: document.getElementById('category').value
    };

    if (!entry.amount || !entry.item) {
        alert('請填寫完整金額與項目');
        return;
    }

    document.getElementById('loading').style.display = 'flex';
    fetch(GAS_URL, { method: "POST", body: JSON.stringify(entry) })
        .then(function() {
            document.getElementById('amount').value = '';
            document.getElementById('item').value = '';
            return fetchData();
        })
        .then(function() {
            alert("雲端儲存成功！");
        })
        .catch(function(e) {
            alert("儲存失敗，請重試");
            document.getElementById('loading').style.display = 'none';
        });
}

// ======= 刪除雲端資料 =======
function deleteItem(id) {
    if (!confirm('確定要從雲端刪除這筆紀錄嗎？')) return;

    document.getElementById('loading').style.display = 'flex';
    fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ action: "delete", id: id })
    })
        .then(function(response) { return response.text(); })
        .then(function(result) {
            if (result === "Deleted") {
                fetchData();
            } else {
                alert("刪除失敗：雲端找不到該項目");
                document.getElementById('loading').style.display = 'none';
            }
        })
        .catch(function(e) {
            alert("網路連線錯誤");
            document.getElementById('loading').style.display = 'none';
        });
}

// ======= 重設歷史篩選 =======
function resetHistFilter() {
    document.getElementById('hist-start').value = getFirstDayOfMonthStr();
    document.getElementById('hist-end').value = getTodayStr();
    renderHistory();
}

// 初始化
window.onload = function() {
    try {
        var now = new Date();
        var today = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        var firstDayOfMonth = today.substring(0, 8) + '01';

        var setVal = function(id, val) {
            var el = document.getElementById(id);
            if (el) el.value = val;
        };

        setVal('date', today);
        setVal('start-date', firstDayOfMonth);
        setVal('end-date', today);

        // ★ 歷史頁日期預設值
        setVal('hist-start', firstDayOfMonth);
        setVal('hist-end', today);

        // ★ 初始化分類標籤
        initCatTags();

        fetchData();
    } catch (e) {
        console.error("初始化失敗:", e);
    }
};

// ======= 頁面切換 =======
function showPage(pageId) {
    var pages = document.querySelectorAll('div[id^="page-"]');
    for (var i = 0; i < pages.length; i++) {
        pages[i].classList.add('hidden');
    }
    var navBtns = document.querySelectorAll('nav button');
    for (var j = 0; j < navBtns.length; j++) {
        navBtns[j].classList.remove('nav-active');
        navBtns[j].classList.add('text-gray-500');
    }
    document.getElementById('page-' + pageId).classList.remove('hidden');
    var activeNav = document.getElementById('nav-' + pageId);
    activeNav.classList.add('nav-active');
    activeNav.classList.remove('text-gray-500');
    if (pageId === 'chart') renderChart();
    window.scrollTo(0, 0);
}

// ======= 更新顯示 =======
function updateDisplay() {
    document.getElementById('display-user').innerText = document.getElementById('user').value;
    document.getElementById('display-type').innerText = document.getElementById('type').value;
}

// ======= 渲染歷史紀錄（含日期篩選）=======
function renderHistory() {
    var list = document.getElementById('history-list');

    // ★ 讀取篩選日期
    var histStart = document.getElementById('hist-start') ? document.getElementById('hist-start').value : '';
    var histEnd = document.getElementById('hist-end') ? document.getElementById('hist-end').value : '';

    // ★ 過濾
    var filtered = db.filter(function(item) {
        var d = safeDate(item.date);
        if (histStart && d < histStart) return false;
        if (histEnd && d > histEnd) return false;
        return true;
    });

    if (!filtered.length) {
        list.innerHTML = '<p class="text-center text-stone-400 mt-10">該區間無紀錄</p>';
        return;
    }

    var html = '';
    for (var i = 0; i < filtered.length; i++) {
        var item = filtered[i];
        var displayDate = safeDate(item.date);
        html += '<div class="card p-4 flex justify-between items-center border-l-4 border-stone-200 font-bold text-sm mb-3">' +
            '<div>' +
            '<p class="text-[10px] text-stone-400">' + displayDate + ' · ' + item.user + item.type + '</p>' +
            '<p>' + item.item + ' <span class="text-[9px] font-normal text-stone-400">#' + item.category + '</span></p>' +
            '</div>' +
            '<div class="text-right">' +
            '<p class="text-stone-800">$' + Number(item.amount).toLocaleString() + '</p>' +
            '<button onclick="deleteItem(\'' + item.id + '\')" class="text-[10px] text-red-400 underline font-normal mt-1">Delete</button>' +
            '</div>' +
            '</div>';
    }
    list.innerHTML = html;
}

// ======= 渲染 Full Details（含分類篩選）=======
function renderFullDetails() {
    var start = document.getElementById('start-date').value;
    var end = document.getElementById('end-date').value;

    var filtered = [];
    for (var i = 0; i < db.length; i++) {
        var d = safeDate(db[i].date);
        if (d >= start && d <= end) filtered.push(db[i]);
    }

    // ★ 分類過濾
    if (selectedCats.length > 0) {
        filtered = filtered.filter(function(item) {
            return selectedCats.indexOf(item.category) >= 0;
        });
    }

    var sortedFiltered = filtered.slice().sort(function(a, b) {
        var da = safeDate(a.date);
        var db2 = safeDate(b.date);
        if (db2 > da) return 1;
        if (db2 < da) return -1;
        return 0;
    });

    var detailHtml = '';
    for (var f = 0; f < sortedFiltered.length; f++) {
        var fi = sortedFiltered[f];
        var dateStr = safeDate(fi.date);
        detailHtml += '<div class="flex justify-between items-center bg-white/50 p-3 rounded-lg border border-stone-100 shadow-sm text-xs mb-2">' +
            '<div class="flex flex-col">' +
            '<span class="text-[9px] text-stone-400 font-normal">' + dateStr + ' · ' + fi.user + fi.type + '</span>' +
            '<span class="text-stone-700 font-bold">' + fi.item + '</span>' +
            '</div>' +
            '<div class="text-right">' +
            '<span class="text-stone-800 font-bold">$' + Number(fi.amount).toLocaleString() + '</span>' +
            '<div class="text-[9px] text-stone-400 font-normal">' + fi.category + '</div>' +
            '</div>' +
            '</div>';
    }
    document.getElementById('full-detail-list').innerHTML = detailHtml || '<p class="text-[10px] text-stone-400 italic text-center py-10">選定條件內無任何紀錄</p>';
}

// ======= 渲染分析圖表 =======
function renderChart() {
    var startInput = document.getElementById('start-date');
    var endInput = document.getElementById('end-date');
    if (!startInput || !endInput) return;

    var start = startInput.value;
    var end = endInput.value;

    var filtered = [];
    for (var i = 0; i < db.length; i++) {
        var d = safeDate(db[i].date);
        if (d >= start && d <= end) {
            filtered.push(db[i]);
        }
    }

    var stats = { "倪家用": 0, "倪個人": 0, "光家用": 0, "光個人": 0 };
    var cats = { home: {}, ni: {}, guang: {} };

    for (var j = 0; j < filtered.length; j++) {
        var item = filtered[j];
        var amt = Number(item.amount) || 0;
        var key = item.user + item.type;
        if (stats.hasOwnProperty(key)) {
            stats[key] += amt;
        }
        if (item.type === "家用") {
            cats.home[item.category] = (cats.home[item.category] || 0) + amt;
        } else if (item.user === "倪") {
            cats.ni[item.category] = (cats.ni[item.category] || 0) + amt;
        } else if (item.user === "光") {
            cats.guang[item.category] = (cats.guang[item.category] || 0) + amt;
        }
    }

    document.getElementById('stat-ni-home').innerText = '$' + stats['倪家用'].toLocaleString();
    document.getElementById('stat-ni-self').innerText = '$' + stats['倪個人'].toLocaleString();
    document.getElementById('stat-guang-home').innerText = '$' + stats['光家用'].toLocaleString();
    document.getElementById('stat-guang-self').innerText = '$' + stats['光個人'].toLocaleString();

    var palette = ['#E07A5F', '#3D405B', '#81B29A', '#F2CC8F', '#9ead9d', '#A69CAC', '#E8A598', '#8E9AAF', '#C44536', '#7785AC'];

    function genConfig(data) {
        var labels = Object.keys(data);
        var values = Object.values(data);
        return {
            type: 'doughnut',
            data: {
                labels: labels.length > 0 ? labels : ['無資料'],
                datasets: [{
                    data: values.length > 0 ? values : [1],
                    backgroundColor: labels.length > 0 ? palette : ['#f0f0f0'],
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                maintainAspectRatio: false,
                animation: { duration: 500 },
                plugins: {
                    legend: {
                        display: labels.length > 0,
                        position: 'right',
                        labels: { color: '#4a4541', font: { size: 9, weight: '700' }, boxWidth: 8 }
                    }
                }
            }
        };
    }

    var chartKeys = ['home', 'ni', 'guang'];
    for (var k = 0; k < chartKeys.length; k++) {
        var ck = chartKeys[k];
        var canvas = document.getElementById(ck + 'Chart');
        if (!canvas) continue;
        var ctx = canvas.getContext('2d');
        if (charts[ck]) {
            charts[ck].destroy();
        }
        charts[ck] = new Chart(ctx, genConfig(cats[ck]));
    }

    // Big Expenses
    var bigOnes = filtered.filter(function(i) { return Number(i.amount) >= 1000; });
    bigOnes.sort(function(a, b) { return Number(b.amount) - Number(a.amount); });
    bigOnes = bigOnes.slice(0, 5);

    var bigHtml = '';
    for (var b = 0; b < bigOnes.length; b++) {
        var bi = bigOnes[b];
        bigHtml += '<div class="flex justify-between text-[11px] py-2 border-b border-stone-100 font-bold italic">' +
            '<span class="text-stone-600">' + bi.item + ' (' + bi.user + bi.type + ')</span>' +
            '<span class="text-stone-800">$' + Number(bi.amount).toLocaleString() + '</span>' +
            '</div>';
    }
    document.getElementById('big-list').innerHTML = bigHtml || '<p class="text-[10px] text-stone-400 italic">期間內無大額支出</p>';

    // Full Details（呼叫獨立函數，保留分類篩選狀態）
    renderFullDetails();
}
</script>
</body>
</html>
