<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倪光雲端家計簿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f3f0; color: #4a4541; -webkit-tap-highlight-color: transparent; }
        .card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #8a9a89; color: white; transition: 0.3s; font-weight: 700; }
        .btn-primary:active { background-color: #6d7a6c; transform: scale(0.98); }
        .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .nav-active { color: #7a8a79; font-weight: 700; border-top: 2px solid #7a8a79; }
        .stat-box { background: #fdfcfb; border-radius: 12px; padding: 14px; border-left: 5px solid #8a9a89; border-top: 1px solid #eee; }
        .chart-container { position: relative; height: 220px; width: 100%; }
    </style>
</head>
<body class="pb-24">
    <div id="loading" class="loading font-bold text-stone-500"><span>同步中...</span></div>

    <!-- 底部導覽列 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around p-2 z-50">
        <button onclick="showPage('add')" id="nav-add" class="flex flex-col items-center p-2 nav-active text-xs"><span>🖋️</span>記帳</button>
        <button onclick="showPage('history')" id="nav-history" class="flex flex-col items-center p-2 text-gray-500 text-xs"><span>📜</span>紀錄</button>
        <button onclick="showPage('chart')" id="nav-chart" class="flex flex-col items-center p-2 text-gray-500 text-xs"><span>📊</span>分析</button>
        <button onclick="showPage('setting')" id="nav-setting" class="flex flex-col items-center p-2 text-gray-500 text-xs"><span>⚙️</span>設定</button>
    </nav>

    <!-- 第一頁：新增紀錄 -->
    <div id="page-add" class="p-6">
        <h2 class="text-lg font-bold mb-6 tracking-widest text-center">生活誌紀錄</h2>
        <div class="card p-6 space-y-5">
            <div class="flex justify-between border-b border-stone-300 pb-2 text-sm font-bold">
                <input type="date" id="date" class="outline-none bg-transparent">
                <span class="text-stone-600 uppercase"><span id="display-user">倪</span> · <span id="display-type">家用</span></span>
            </div>
            <div class="flex gap-4">
                <div class="flex-1"><label class="text-[10px] font-bold text-stone-500">紀錄者</label>
                    <select id="user" onchange="updateDisplay()" class="w-full border-b py-2 text-sm outline-none">
                        <option value="倪">倪</option><option value="光">光</option></select></div>
                <div class="flex-1"><label class="text-[10px] font-bold text-stone-500">屬性</label>
                    <select id="type" onchange="updateDisplay()" class="w-full border-b py-2 text-sm outline-none">
                        <option value="家用">家用</option><option value="個人">個人</option></select></div>
            </div>
            <div><label class="text-[10px] font-bold text-stone-500">金額</label>
                <input type="number" id="amount" inputmode="numeric" placeholder="0" class="w-full border-b py-2 text-3xl font-bold outline-none"></div>
            <div class="flex gap-4">
                <div class="w-1/2"><label class="text-[10px] font-bold text-stone-500">項目</label>
                    <input type="text" id="item" placeholder="細節描述" class="w-full border-b py-2 text-sm outline-none"></div>
                <div class="w-1/2"><label class="text-[10px] font-bold text-stone-500">分類</label>
                    <select id="category" class="w-full border-b py-2 text-sm outline-none">
                        <option value="飲食">飲食</option><option value="日常">日常</option><option value="交通">交通</option>
                        <option value="醫療">醫療</option><option value="娛樂">娛樂</option><option value="治裝">治裝</option>
                        <option value="保險">保險</option><option value="寵物">寵物</option><option value="運動">運動</option><option value="其他">其他</option>
                    </select></div>
            </div>
            <button onclick="submitData()" class="w-full btn-primary p-4 rounded-full mt-6 tracking-widest text-sm shadow-md">同步至雲端帳簿</button>
        </div>
    </div>

    <!-- 第二頁：歷史紀錄 -->
    <div id="page-history" class="hidden p-6"><h2 class="text-lg font-bold mb-6 tracking-widest text-center">歷史帳項</h2><div id="history-list" class="space-y-4"></div></div>

    <!-- 第三頁：分析報告 -->
    <div id="page-chart" class="hidden p-6 text-stone-700">
        <h2 class="text-lg font-bold mb-4 tracking-widest text-center">收支分析</h2>
        <div class="flex items-center justify-between gap-2 mb-6 bg-white p-3 rounded-xl shadow-sm border border-stone-200">
            <input type="date" id="start-date" onchange="renderChart()" class="text-xs outline-none bg-transparent">
            <span class="text-xs text-stone-400">至</span>
            <input type="date" id="end-date" onchange="renderChart()" class="text-xs outline-none bg-transparent">
        </div>
        <div class="grid grid-cols-2 gap-3 mb-8 font-bold text-center">
            <div class="stat-box"><p class="text-[9px] text-stone-500 uppercase">倪 · 家用</p><p class="text-sm" id="stat-ni-home">$0</p></div>
            <div class="stat-box"><p class="text-[9px] text-stone-500 uppercase">倪 · 個人</p><p class="text-sm" id="stat-ni-self">$0</p></div>
            <div class="stat-box border-l-stone-400"><p class="text-[9px] text-stone-500 uppercase">光 · 家用</p><p class="text-sm" id="stat-guang-home">$0</p></div>
            <div class="stat-box border-l-stone-400"><p class="text-[9px] text-stone-500 uppercase">光 · 個人</p><p class="text-sm" id="stat-guang-self">$0</p></div>
        </div>
        <div class="space-y-6">
            <div class="card p-4"><h3 class="text-[11px] font-bold text-center mb-3 text-stone-500">● 全家 · 家用花費</h3><div class="chart-container"><canvas id="homeChart"></canvas></div></div>
            <div class="card p-4"><h3 class="text-[11px] font-bold text-center mb-3 text-stone-500">● 倪 · 個人花費</h3><div class="chart-container"><canvas id="niChart"></canvas></div></div>
            <div class="card p-4"><h3 class="text-[11px] font-bold text-center mb-3 text-stone-500">● 光 · 個人花費</h3><div class="chart-container"><canvas id="guangChart"></canvas></div></div>
        </div>
        <!-- 補回大額支出區域 -->
        <div class="mt-8">
            <h3 class="text-xs font-bold text-stone-500 mb-3 tracking-widest border-l-4 border-stone-400 pl-2 uppercase">Big Expenses (> $1,000)</h3>
            <div id="big-list" class="space-y-1"></div>
        </div>
    </div>

    <!-- 第四頁：設定 -->
    <div id="page-setting" class="hidden p-6 text-center">
        <h2 class="text-lg font-bold mb-6 tracking-widest text-center">系統設定</h2>
        <div class="card p-8"><button onclick="fetchData()" class="w-full py-4 bg-stone-700 text-white rounded-full text-sm font-bold shadow-md">🔄 立即強制同步雲端</button></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwwaJ9meqFj9R1fl2yKedAFy_MVNvkJfYHmkV4b6mgqrLHH1ZgMZew_RQ4HPT9M7sqq/exec"; // 務必替換成您的 URL
        let db = [];

        async function fetchData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action: "get"}) });
                db = await response.json();
                db.sort((a, b) => new Date(b.date) - new Date(a.date) || b.id - a.id); // 確保日期最新在上面
                renderHistory();
                renderChart();
            } catch (e) { console.error(e); }
            document.getElementById('loading').style.display = 'none';
        }

        async function submitData() {
            const entry = {
                action: "add",
                id: Date.now(),
                date: document.getElementById('date').value,
                user: document.getElementById('user').value,
                type: document.getElementById('type').value,
                amount: parseFloat(document.getElementById('amount').value) || 0,
                item: document.getElementById('item').value,
                category: document.getElementById('category').value
            };
            if(!entry.amount || !entry.item) return alert('請填寫完整');
            document.getElementById('loading').style.display = 'flex';
            try {
                await fetch(GAS_URL, { method: "POST", body: JSON.stringify(entry) });
                document.getElementById('amount').value = '';
                document.getElementById('item').value = '';
                await fetchData();
                alert("雲端儲存成功！");
            } catch (e) { alert("儲存失敗"); }
            document.getElementById('loading').style.display = 'none';
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('date').valueAsDate = now;
            document.getElementById('start-date').valueAsDate = new Date(now.getFullYear(), now.getMonth(), 1);
            document.getElementById('end-date').valueAsDate = now;
            fetchData();
        };

        function showPage(pageId) {
            document.querySelectorAll('div[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-gray-500'); });
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.getElementById('nav-' + pageId).classList.add('nav-active');
            document.getElementById('nav-' + pageId).classList.remove('text-gray-500');
            if(pageId === 'chart') renderChart();
        }

        function updateDisplay() {
            document.getElementById('display-user').innerText = document.getElementById('user').value;
            document.getElementById('display-type').innerText = document.getElementById('type').value;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = db.length ? db.map(item => `
                <div class="card p-4 flex justify-between items-center border-l-4 border-stone-200 font-bold text-sm mb-3">
                    <div><p class="text-[10px] text-stone-400">${item.date} · ${item.user}${item.type}</p><p>${item.item} <span class="text-[9px] font-normal text-stone-400">#${item.category}</span></p></div>
                    <div class="text-right text-stone-800">$${Number(item.amount).toLocaleString()}</div>
                </div>
            `).join('') : '<p class="text-center text-stone-400 mt-10">尚無紀錄</p>';
        }

        let charts = { home: null, ni: null, guang: null };
        function renderChart() {
            const start = document.getElementById('start-date').value;
            const end = document.getElementById('end-date').value;
            const filtered = db.filter(i => i.date >= start && i.date <= end);

            let stats = { "倪家用": 0, "倪個人": 0, "光家用": 0, "光個人": 0 };
            let cats = { home: {}, ni: {}, guang: {} };
            
            // 處理大額支出邏輯
            let bigOnes = filtered.filter(i => Number(i.amount) >= 1000).sort((a,b) => b.amount - a.amount).slice(0, 5);

            filtered.forEach(i => {
                const amt = Number(i.amount);
                const key = i.user + i.type;
                if(stats.hasOwnProperty(key)) stats[key] += amt;
                if(i.type === "家用") cats.home[i.category] = (cats.home[i.category] || 0) + amt;
                else if(i.user === "倪") cats.ni[i.category] = (cats.ni[i.category] || 0) + amt;
                else if(i.user === "光") cats.guang[i.category] = (cats.guang[i.category] || 0) + amt;
            });

            document.getElementById('stat-ni-home').innerText = `$${stats['倪家用'].toLocaleString()}`;
            document.getElementById('stat-ni-self').innerText = `$${stats['倪個人'].toLocaleString()}`;
            document.getElementById('stat-guang-home').innerText = `$${stats['光家用'].toLocaleString()}`;
            document.getElementById('stat-guang-self').innerText = `$${stats['光個人'].toLocaleString()}`;

            const palette = ['#E07A5F', '#3D405B', '#81B29A', '#F2CC8F', '#9ead9d', '#A69CAC', '#E8A598', '#8E9AAF', '#C44536', '#7785AC'];
            const genConfig = (data) => ({
                type: 'doughnut', data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: palette, borderWidth: 2, borderColor: '#ffffff' }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#4a4541', font: { size: 9, weight: '700' }, boxWidth: 8 } } } }
            });

            ['home', 'ni', 'guang'].forEach(key => { if(charts[key]) charts[key].destroy(); charts[key] = new Chart(document.getElementById(key + 'Chart').getContext('2d'), genConfig(cats[key])); });

            // 渲染大額支出清單
            document.getElementById('big-list').innerHTML = bigOnes.map(i => `
                <div class="flex justify-between text-[11px] py-2 border-b border-stone-100 font-bold italic">
                    <span class="text-stone-600">${i.item} (${i.user}${i.type})</span>
                    <span class="text-stone-800">$${Number(i.amount).toLocaleString()}</span>
                </div>
            `).join('') || '<p class="text-[10px] text-stone-400 italic">期間內無大額支出</p>';
        }
    </script>
</body>
</html>
