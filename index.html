<!DOCTYPE html>
<html lang="zh-TW">
<head>
<!-- 在檔名後面加上 ?v=123 這樣的版本號 -->
<link rel="apple-touch-icon" href="./myicon.png?v=3">
<link rel="manifest" href="manifest.json?v=3">
<meta name="mobile-web-app-capable" content="yes">
    <!-- 讓網頁看起來像 App 的設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="倪光家計簿">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/552/552791.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倪光雲端家計簿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f3f0; color: #4a4541; -webkit-tap-highlight-color: transparent; }
        .card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #8a9a89; color: white; transition: 0.3s; font-weight: 700; }
        .btn-primary:active { background-color: #6d7a6c; transform: scale(0.98); }
        .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .nav-active { color: #7a8a79; font-weight: 700; border-top: 2px solid #7a8a79; }
        .stat-box { background: #fdfcfb; border-radius: 12px; padding: 14px; border-left: 5px solid #8a9a89; border-top: 1px solid #eee; }
        .chart-container { position: relative; height: 220px; width: 100%; }
        select, input { background-color: transparent !important; }
    </style>
</head>
<body class="pb-24">
    <!-- 全域載入動畫 -->
    <div id="loading" class="loading font-bold text-stone-500">
        <div class="mb-2">⏳</div>
        <span>雲端同步中...</span>
    </div>

    <!-- 底部導覽列 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around p-2 z-50">
        <button onclick="showPage('add')" id="nav-add" class="flex flex-col items-center p-2 nav-active text-xs"><span>🖋️</span>記帳</button>
        <button onclick="showPage('history')" id="nav-history" class="flex flex-col items-center p-2 text-gray-500 text-xs"><span>📜</span>紀錄</button>
        <button onclick="showPage('chart')" id="nav-chart" class="flex flex-col items-center p-2 text-gray-500 text-xs"><span>📊</span>分析</button>
        <button onclick="showPage('setting')" id="nav-setting" class="flex flex-col items-center p-2 text-gray-500 text-xs"><span>⚙️</span>設定</button>
    </nav>

    <!-- 第一頁：新增紀錄 -->
    <div id="page-add" class="p-6">
        <h2 class="text-lg font-bold mb-6 tracking-widest text-center">生活記帳簿</h2>
        <div class="card p-6 space-y-5">
            <div class="flex justify-between border-b border-stone-300 pb-2 text-sm font-bold">
                <input type="date" id="date" class="outline-none bg-transparent">
                <span class="text-stone-600 uppercase"><span id="display-user">倪</span> · <span id="display-type">家用</span></span>
            </div>
            
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-stone-500 uppercase">紀錄者</label>
                    <select id="user" onchange="updateDisplay()" class="w-full border-b py-2 text-sm outline-none">
                        <option value="倪">倪</option><option value="光">光</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-stone-500 uppercase">屬性</label>
                    <select id="type" onchange="updateDisplay()" class="w-full border-b py-2 text-sm outline-none">
                        <option value="家用">家用</option><option value="個人">個人</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-stone-500 uppercase">金額</label>
                <input type="number" id="amount" inputmode="numeric" placeholder="0" class="w-full border-b py-2 text-3xl font-bold outline-none text-stone-800">
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="text-[10px] font-bold text-stone-500 uppercase">項目</label>
                    <input type="text" id="item" placeholder="細節描述" class="w-full border-b py-2 text-sm outline-none">
                </div>
                <div class="w-1/2">
                    <label class="text-[10px] font-bold text-stone-500 uppercase">分類</label>
                    <select id="category" class="w-full border-b py-2 text-sm outline-none">
                        <option value="飲食">飲食</option><option value="日常">日常</option>
                        <option value="交通">交通</option><option value="醫療">醫療</option>
                        <option value="娛樂">娛樂</option><option value="治裝">治裝</option>
                        <option value="保險">保險</option><option value="寵物">寵物</option>
                        <option value="運動">運動</option><option value="其他">其他</option>
                    </select>
                </div>
            </div>

            <button onclick="submitData()" class="w-full btn-primary p-4 rounded-full mt-6 tracking-widest text-sm shadow-md">同步至雲端帳簿</button>
        </div>
    </div>

   <!-- 第二頁：歷史紀錄 -->
<div id="page2" class="page-content hidden">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-stone-800">歷史紀錄</h2>
        <button onclick="syncData()" class="text-xs bg-stone-200 px-3 py-1 rounded-full active:bg-stone-300 transition-colors">立即強制同步雲端</button>
    </div>

    <!-- 複製分析頁的日期篩選器結構 -->
    <div class="bg-stone-100 p-4 rounded-xl mb-6 flex items-center gap-2 shadow-inner">
        <input type="date" id="history-filter-start" onchange="renderHistory()" class="bg-transparent text-sm font-bold text-stone-600 focus:outline-none flex-1">
        <span class="text-stone-400">至</span>
        <input type="date" id="history-filter-end" onchange="renderHistory()" class="bg-transparent text-sm font-bold text-stone-600 focus:outline-none flex-1">
    </div>

    <!-- 紀錄顯示區域 -->
    <div id="history-list" class="space-y-3 pb-20">
        <!-- 紀錄會由 JS 動態生成在此 -->
    </div>
</div>

    <!-- 第三頁：分析報告 -->
    <div id="page-chart" class="hidden p-6 text-stone-700">
        <h2 class="text-lg font-bold mb-4 tracking-widest text-center">收支分析</h2>
        
        <div class="flex items-center justify-between gap-2 mb-6 bg-white p-3 rounded-xl shadow-sm border border-stone-200">
            <input type="date" id="start-date" onchange="renderChart()" class="text-xs outline-none bg-transparent">
            <span class="text-xs text-stone-400">至</span>
            <input type="date" id="end-date" onchange="renderChart()" class="text-xs outline-none bg-transparent">
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8 font-bold text-center">
            <div class="stat-box"><p class="text-[9px] text-stone-500 uppercase">倪 · 家用</p> <p class="text-sm" id="stat-ni-home">$0</p> </div>
            <div class="stat-box"><p class="text-[9px] text-stone-500 uppercase">倪 · 個人</p> <p class="text-sm" id="stat-ni-self">$0</p> </div>
            <div class="stat-box border-l-stone-400"><p class="text-[9px] text-stone-500 uppercase">光 · 家用</p> <p class="text-sm" id="stat-guang-home">$0</p> </div>
            <div class="stat-box border-l-stone-400"><p class="text-[9px] text-stone-500 uppercase">光 · 個人</p> <p class="text-sm" id="stat-guang-self">$0</p> </div>
        </div>

        <div class="space-y-6">
            <div class="card p-4">
                <h3 class="text-[11px] font-bold text-center mb-3 text-stone-500 uppercase tracking-widest">● 全家 · 家用花費</h3>
                <div class="chart-container"><canvas id="homeChart"></canvas></div>
            </div>
            <div class="card p-4">
                <h3 class="text-[11px] font-bold text-center mb-3 text-stone-500 uppercase tracking-widest">● 倪 · 個人花費</h3>
                <div class="chart-container"><canvas id="niChart"></canvas></div>
            </div>
            <div class="card p-4">
                <h3 class="text-[11px] font-bold text-center mb-3 text-stone-500 uppercase tracking-widest">● 光 · 個人花費</h3>
                <div class="chart-container"><canvas id="guangChart"></canvas></div>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="text-xs font-bold text-stone-500 mb-3 tracking-widest border-l-4 border-stone-400 pl-2 uppercase">Big Expenses (> $1,000)</h3>
            <div id="big-list" class="space-y-1"></div>
        </div>
    </div>

    <!-- 第四頁：設定 -->
    <div id="page-setting" class="hidden p-6 text-center">
        <h2 class="text-lg font-bold mb-6 tracking-widest text-center font-bold">系統設定</h2>
        <div class="card p-8">
            <p class="text-[10px] text-stone-400 mb-4 tracking-widest">目前資料儲存於 Google 試算表</p>
            <button onclick="fetchData()" class="w-full py-4 bg-stone-700 text-white rounded-full text-sm font-bold shadow-md active:scale-95 transition-all">🔄 立即強制同步雲端</button>
        </div>
    </div>

    <script>
    // 1. 【就在這裡！】請把這段貼在 <script> 開始後的第一個位置
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('App 服務啟動成功'))
                .catch(err => console.log('服務啟動失敗', err));
        });
    }
        // ======= 請在此處替換您的 GAS URL =======
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw4f7HKvhbqqQZrRMj3fKLFYnk9Mu7Oh_3xLr2aIu_mQikCDeGjsys8qyNKggy4ZWRO/exec";
        // ======================================

        let db = [];
        let charts = { home: null, ni: null, guang: null }; // 圖表儲存變數

        // 從雲端抓取資料
        async function fetchData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action: "get"}) });
                db = await response.json();
                db.sort((a, b) => new Date(b.date) - new Date(a.date) || b.id - a.id);
                renderHistory();
                renderChart(); // 抓完資料立即更新分析
            } catch (e) {
                console.error("Fetch error:", e);
                alert("同步失敗，請檢查網路連線或 GAS 設定");
            }
            document.getElementById('loading').style.display = 'none';
        }

        // 提交資料到雲端
        async function submitData() {
            const entry = {
                action: "add",
                id: Date.now(),
                date: document.getElementById('date').value,
                user: document.getElementById('user').value,
                type: document.getElementById('type').value,
                amount: parseFloat(document.getElementById('amount').value) || 0,
                item: document.getElementById('item').value,
                category: document.getElementById('category').value
            };

            if(!entry.amount || !entry.item) return alert('請填寫完整金額與項目');

            document.getElementById('loading').style.display = 'flex';
            try {
                await fetch(GAS_URL, { method: "POST", body: JSON.stringify(entry) });
                document.getElementById('amount').value = '';
                document.getElementById('item').value = '';
                await fetchData(); 
                alert("雲端儲存成功！");
            } catch (e) {
                alert("儲存失敗，請重試");
            }
            document.getElementById('loading').style.display = 'none';
        }

        // 刪除雲端資料
        async function deleteItem(id) {
            if(!confirm('確定要從雲端刪除這筆紀錄嗎？')) return;
            
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(GAS_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ action: "delete", id: id }) 
                });
                const result = await response.text();
                if(result === "Deleted") {
                    await fetchData(); // 刪除後自動觸發更新圖表
                } else {
                    alert("刪除失敗：雲端找不到該項目");
                }
            } catch (e) {
                alert("網路連線錯誤");
            }
            document.getElementById('loading').style.display = 'none';
        }

        // 初始化
        window.onload = () => {
    const now = new Date();
    
    // 取得今天的日期 (格式：YYYY-MM-DD)
    const today = now.toLocaleDateString('sv-SE'); 
    
    // 取得當月 1 號的日期
    // 邏輯：取今天的年份與月份，後面固定接 -01
    const firstDayOfMonth = today.substring(0, 8) + '01';

    // 設定「記帳分頁」的預設日期為今天
    if (document.getElementById('date')) {
        document.getElementById('date').value = today;
    }

    // 設定「收支分析分頁」的預設區間：當月 1 號到今天
    if (document.getElementById('start-date')) {
        document.getElementById('start-date').value = firstDayOfMonth;
    }
    if (document.getElementById('end-date')) {
        document.getElementById('end-date').value = today;
    }

    // 設定「歷史紀錄分頁」的預設區間 (如果您剛才也有加的話)
    if (document.getElementById('filter-start')) {
        document.getElementById('filter-start').value = firstDayOfMonth;
    }
    if (document.getElementById('filter-end')) {
        document.getElementById('filter-end').value = today;
    }

    fetchData(); // 從 Google 試算表抓取資料
};

        function showPage(pageId) {
            document.querySelectorAll('div[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('nav-active');
                b.classList.add('text-gray-500');
            });
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.getElementById('nav-' + pageId).classList.add('nav-active');
            document.getElementById('nav-' + pageId).classList.remove('text-gray-500');
            if(pageId === 'chart') renderChart();
            window.scrollTo(0,0);
        }

        function updateDisplay() {
            document.getElementById('display-user').innerText = document.getElementById('user').value;
            document.getElementById('display-type').innerText = document.getElementById('type').value;
        }

        function renderHistory() {
    const list = document.getElementById('history-list');
    // 取得歷史紀錄頁專用的篩選器數值
    const startInput = document.getElementById('history-filter-start').value; 
    const endInput = document.getElementById('history-filter-end').value;

    if (!db || db.length === 0) {
        list.innerHTML = '<p class="text-center text-stone-400 mt-10 text-sm font-normal">尚無資料，請先新增帳目或同步雲端</p>';
        return;
    }

    // 過濾邏輯
    const filteredDb = db.filter(item => {
        if (!item.date || item.date === "date") return false;
        
        // 統一格式為 YYYY-MM-DD
        const itemDate = new Date(item.date).toISOString().split('T')[0];

        const matchStart = startInput ? (itemDate >= startInput) : true;
        const matchEnd = endInput ? (itemDate <= endInput) : true;
        
        return matchStart && matchEnd;
    });

    // 排序：日期由新到舊
    filteredDb.sort((a, b) => new Date(b.date) - new Date(a.date));

    if (filteredDb.length === 0) {
        list.innerHTML = '<p class="text-center text-stone-400 mt-10 text-sm font-normal">此日期區間尚無紀錄</p>';
    } else {
        list.innerHTML = filteredDb.map(item => {
            const d = new Date(item.date);
            const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
            const isExpense = item.type === '支出';

            return `
            <div class="bg-white p-4 flex justify-between items-center border-l-4 ${isExpense ? 'border-red-200' : 'border-green-200'} font-bold text-sm shadow-sm rounded-r-lg mb-1">
                <div class="flex items-center gap-3">
                    <div class="text-[10px] text-stone-400 font-normal leading-tight text-center">
                        ${dateStr}<br>${item.user || ''}
                    </div>
                    <div>
                        <p class="text-stone-800">${item.item || '未命名'}</p>
                        <p class="text-[10px] font-normal text-stone-400">${item.category || ''}</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="${isExpense ? 'text-red-500' : 'text-green-600'}">
                        ${isExpense ? '-' : '+'}$${Number(item.amount || 0).toLocaleString()}
                    </p>
                    <button onclick="deleteItem('${item.id}')" class="text-[10px] text-stone-300 font-normal mt-1 active:text-red-400">刪除</button>
                </div>
            </div>
            `;
        }).join('');
    }
}
        // --- 優化後的分析函數 ---
        function renderChart() {
            const startInput = document.getElementById('start-date');
            const endInput = document.getElementById('end-date');
            if (!startInput || !endInput) return;

            const start = startInput.value;
            const end = endInput.value;
            const filtered = db.filter(i => i.date >= start && i.date <= end);

            let stats = { "倪家用": 0, "倪個人": 0, "光家用": 0, "光個人": 0 };
            let cats = { home: {}, ni: {}, guang: {} };
            
            let bigOnes = filtered.filter(i => Number(i.amount) >= 1000).sort((a,b) => b.amount - a.amount).slice(0, 5);

            filtered.forEach(i => {
                const amt = Number(i.amount) || 0;
                const key = i.user + i.type;
                if(stats.hasOwnProperty(key)) stats[key] += amt;
                
                if(i.type === "家用") {
                    cats.home[i.category] = (cats.home[i.category] || 0) + amt;
                } else if(i.user === "倪") {
                    cats.ni[i.category] = (cats.ni[i.category] || 0) + amt;
                } else if(i.user === "光") {
                    cats.guang[i.category] = (cats.guang[i.category] || 0) + amt;
                }
            });

            document.getElementById('stat-ni-home').innerText = `$${stats['倪家用'].toLocaleString()}`;
            document.getElementById('stat-ni-self').innerText = `$${stats['倪個人'].toLocaleString()}`;
            document.getElementById('stat-guang-home').innerText = `$${stats['光家用'].toLocaleString()}`;
            document.getElementById('stat-guang-self').innerText = `$${stats['光個人'].toLocaleString()}`;

            const palette = ['#E07A5F', '#3D405B', '#81B29A', '#F2CC8F', '#9ead9d', '#A69CAC', '#E8A598', '#8E9AAF', '#C44536', '#7785AC'];

            const genConfig = (data) => {
                const labels = Object.keys(data);
                const values = Object.values(data);
                return {
                    type: 'doughnut',
                    data: {
                        labels: labels.length > 0 ? labels : ['無資料'],
                        datasets: [{ 
                            data: values.length > 0 ? values : [1], 
                            backgroundColor: labels.length > 0 ? palette : ['#f0f0f0'], 
                            borderWidth: 2, 
                            borderColor: '#ffffff' 
                        }]
                    },
                    options: { 
                        maintainAspectRatio: false,
                        animation: { duration: 500 },
                        plugins: { 
                            legend: { 
                                display: labels.length > 0,
                                position: 'right', 
                                labels: { color: '#4a4541', font: { size: 9, weight: '700' }, boxWidth: 8 } 
                            } 
                        }
                    }
                };
            };

            // 確保銷毀舊圖表並重新繪製
            ['home', 'ni', 'guang'].forEach(key => {
                const ctx = document.getElementById(key + 'Chart').getContext('2d');
                if (charts[key]) charts[key].destroy();
                charts[key] = new Chart(ctx, genConfig(cats[key]));
            });

            document.getElementById('big-list').innerHTML = bigOnes.map(i => `
                <div class="flex justify-between text-[11px] py-2 border-b border-stone-100 font-bold italic">
                    <span class="text-stone-600">${i.item} (${i.user}${i.type})</span>
                    <span class="text-stone-800">$${Number(i.amount).toLocaleString()}</span>
                </div>
            `).join('') || '<p class="text-[10px] text-stone-400 italic">期間內無大額支出</p>';
        }
    </script>
</body>
</html>
