<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="apple-touch-icon" href="./icon.png?v=21">
<link rel="manifest" href="manifest.json?v=21">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f3f0; color: #4a4541; -webkit-tap-highlight-color: transparent; }
    .card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .btn-primary { background-color: #8a9a89; color: white; transition: 0.3s; font-weight: 700; }
    .btn-primary:active { background-color: #6d7a6c; transform: scale(0.98); }
    .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
    .nav-active { color: #7a8a79; font-weight: 700; border-top: 2px solid #7a8a79; }
    .stat-box { background: #fdfcfb; border-radius: 12px; padding: 14px; border-left: 5px solid #8a9a89; border-top: 1px solid #eee; }
    .chart-container { position: relative; height: 220px; width: 100%; }
    .trend-container { position: relative; height: 180px; width: 100%; }
    select, input { background-color: transparent !important; }

    .chip { display:inline-block; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; border:1.5px solid #c7c2bd; color:#7a736d; cursor:pointer; transition:all 0.15s; white-space:nowrap; user-select:none; }
    .chip.active { background-color:#8a9a89; border-color:#8a9a89; color:white; }
    .chip:active { transform:scale(0.95); }

    .filter-bar { background:white; border-radius:16px; padding:14px; box-shadow:0 2px 8px rgba(0,0,0,0.04); border:1px solid #ede9e5; margin-bottom:16px; }

    .period-btn { flex:1; padding:6px 0; font-size:11px; font-weight:700; border-radius:999px; border:1.5px solid #c7c2bd; color:#7a736d; background:transparent; cursor:pointer; transition:all 0.15s; }
    .period-btn.active { background:#8a9a89; border-color:#8a9a89; color:white; }
    .period-btn:active { transform:scale(0.96); }

    #toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:#3d3a37; color:white; padding:10px 22px; border-radius:999px; font-size:13px; font-weight:700; opacity:0; pointer-events:none; transition:all 0.3s; z-index:2000; white-space:nowrap; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    #edit-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:3000; align-items:flex-end; justify-content:center; }
    #edit-modal.open { display:flex; }
    #edit-modal-inner { background:#fff; border-radius:24px 24px 0 0; padding:24px; width:100%; max-width:480px; }

    #offline-badge { display:none; position:fixed; top:14px; right:14px; background:#e07a5f; color:white; font-size:10px; font-weight:700; padding:4px 10px; border-radius:999px; z-index:1500; }
    #offline-badge.show { display:block; }
</style>
</head>
<body class="pb-24">

<div id="toast"></div>
<div id="offline-badge">📶 離線佇列 <span id="offline-count">0</span> 筆</div>

<!-- Page: Setting -->
<div id="page-setting" class="hidden p-6 text-center">
    <h2 class="text-lg font-bold mb-6 tracking-widest text-center">系統設定</h2>
    <div class="card p-8 space-y-4">
        <p class="text-[10px] text-stone-400 tracking-widest">目前資料儲存於 Google 試算表</p>
        <button onclick="fetchData()" class="w-full py-4 bg-stone-700 text-white rounded-full text-sm font-bold shadow-md active:scale-95 transition-all">🔄 立即強制同步雲端</button>
        <button onclick="flushOfflineQueue()" class="w-full py-4 bg-stone-200 text-stone-700 rounded-full text-sm font-bold shadow-sm active:scale-95 transition-all">📤 送出離線暫存紀錄</button>
    </div>
</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function(){});
}

var GAS_URL = "https://script.google.com/macros/s/AKfycbw4f7HKvhbqqQZrRMj3fKLFYnk9Mu7Oh_3xLr2aIu_mQikCDeGjsys8qyNKggy4ZWRO/exec";

var db = [];
var charts = { home:null, ni:null, guang:null, trend:null };
var ALL_CATEGORIES = ['飲食','日常','交通','醫療','娛樂','治裝','保險','寵物','運動','其他'];
var ALL_USERS = ['全部','倪家用','倪個人','光家用','光個人'];
var selectedCats = [];
var histSelectedCats = [];
var histSelectedUser = '全部';
var bigShowAll = false;
var bigAllItems = [];
var OFFLINE_KEY = 'niGuangOfflineQueue';

// ── Toast ──
function showToast(msg, ms) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, ms||2000);
}

// ── Offline queue ──
function getQueue() { try { return JSON.parse(localStorage.getItem(OFFLINE_KEY)||'[]'); } catch(e){ return []; } }
function saveQueue(q) { localStorage.setItem(OFFLINE_KEY, JSON.stringify(q)); updateOfflineBadge(); }
function updateOfflineBadge() {
    var q = getQueue();
    var badge = document.getElementById('offline-badge');
    document.getElementById('offline-count').textContent = q.length;
    q.length > 0 ? badge.classList.add('show') : badge.classList.remove('show');
}
function flushOfflineQueue() {
    var q = getQueue();
    if (!q.length) { showToast('沒有離線暫存紀錄'); return; }
    document.getElementById('loading').style.display = 'flex';
    Promise.all(q.map(function(e){ return fetch(GAS_URL,{method:'POST',body:JSON.stringify(e)}); }))
        .then(function(){ saveQueue([]); return fetchData(); })
        .then(function(){ showToast('✅ 離線紀錄已全數上傳！'); })
        .catch(function(){ showToast('⚠️ 部分上傳失敗'); document.getElementById('loading').style.display='none'; });
}

// ── Date helpers ──
function safeDate(val) {
    if (!val) return '';
    return String(val).split('T')[0].substring(0,10).replace(/\//g,'-');
}
function getTodayStr() {
    var n=new Date();
    return new Date(n.getTime()-n.getTimezoneOffset()*60000).toISOString().split('T')[0];
}
function getFirstDay(offsetMonth) {
    offsetMonth = offsetMonth||0;
    var n=new Date(), y=n.getFullYear(), m=n.getMonth()+offsetMonth;
    while(m<0){m+=12;y--;} while(m>11){m-=12;y++;}
    return y+'-'+String(m+1).padStart(2,'0')+'-01';
}
function getLastDay(offsetMonth) {
    offsetMonth = offsetMonth||0;
    var n=new Date(), y=n.getFullYear(), m=n.getMonth()+offsetMonth+1;
    while(m<0){m+=12;y--;} while(m>11){m-=12;y++;}
    var d=new Date(y,m,0);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ── Period picker ──
function setPeriod(p) {
    ['thisMonth','lastMonth','thisYear','custom'].forEach(function(id){
        document.getElementById('pb-'+id).classList.toggle('active', id===p);
    });
    var row = document.getElementById('custom-date-row');
    if (p==='custom') {
        row.style.display = 'flex';
        return;
    }
    row.style.display = 'none';
    var s, e = getTodayStr();
    if (p==='thisMonth')  { s=getFirstDay(0); }
    if (p==='lastMonth')  { s=getFirstDay(-1); e=getLastDay(-1); }
    if (p==='thisYear')   { s=new Date().getFullYear()+'-01-01'; }
    document.getElementById('start-date').value = s;
    document.getElementById('end-date').value = e;
    renderChart();
}
function onCustomDate() {
    ['thisMonth','lastMonth','thisYear','custom'].forEach(function(id){
        document.getElementById('pb-'+id).classList.toggle('active', id==='custom');
    });
    renderChart();
}

// ── Fetch ──
function fetchData() {
    document.getElementById('loading').style.display = 'flex';
    return fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'get'})})
        .then(function(r){ return r.json(); })
        .then(function(data){
            db = data;
            db.sort(function(a,b){
                var da=safeDate(a.date),db2=safeDate(b.date);
                return da<db2?1:da>db2?-1:Number(b.id)-Number(a.id);
            });
            renderHistory();
            renderChart();
            document.getElementById('loading').style.display='none';
        })
        .catch(function(){
            showToast('⚠️ 同步失敗，請檢查網路');
            document.getElementById('loading').style.display='none';
        });
}

// ── Submit ──
function submitData() {
    var entry = {
        action:'add', id:Date.now(),
        date:document.getElementById('date').value,
        user:document.getElementById('user').value,
        type:document.getElementById('type').value,
        amount:parseFloat(document.getElementById('amount').value)||0,
        item:document.getElementById('item').value,
        category:document.getElementById('category').value
    };
    if (!entry.amount||!entry.item) { showToast('⚠️ 請填寫金額與項目'); return; }
    document.getElementById('loading').style.display='flex';
    fetch(GAS_URL,{method:'POST',body:JSON.stringify(entry)})
        .then(function(){
            document.getElementById('amount').value='';
            document.getElementById('item').value='';
            return fetchData();
        })
        .then(function(){ showToast('✅ 已同步至雲端！'); })
        .catch(function(){
            var q=getQueue(); q.push(entry); saveQueue(q);
            document.getElementById('amount').value='';
            document.getElementById('item').value='';
            document.getElementById('loading').style.display='none';
            showToast('📶 網路異常，已暫存離線',3000);
        });
}

// ── Delete ──
function deleteItem(id) {
    if (!confirm('確定要從雲端刪除這筆紀錄嗎？')) return;
    document.getElementById('loading').style.display='flex';
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'delete',id:id})})
        .then(function(r){ return r.text(); })
        .then(function(res){
            if (res==='Deleted') { fetchData().then(function(){ showToast('🗑️ 已刪除'); }); }
            else { showToast('⚠️ 刪除失敗'); document.getElementById('loading').style.display='none'; }
        })
        .catch(function(){ showToast('⚠️ 網路錯誤'); document.getElementById('loading').style.display='none'; });
}

// ── Edit ──
function openEditModal(id) {
    var item = db.find(function(x){ return String(x.id)===String(id); });
    if (!item) return;
    document.getElementById('edit-id').value = item.id;
    document.getElementById('edit-date').value = safeDate(item.date);
    document.getElementById('edit-user').value = item.user;
    document.getElementById('edit-type').value = item.type;
    document.getElementById('edit-amount').value = item.amount;
    document.getElementById('edit-item').value = item.item;
    document.getElementById('edit-category').value = item.category;
    document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }
function saveEdit() {
    var updated = {
        action:'update', id:document.getElementById('edit-id').value,
        date:document.getElementById('edit-date').value,
        user:document.getElementById('edit-user').value,
        type:document.getElementById('edit-type').value,
        amount:parseFloat(document.getElementById('edit-amount').value)||0,
        item:document.getElementById('edit-item').value,
        category:document.getElementById('edit-category').value
    };
    if (!updated.amount||!updated.item) { showToast('⚠️ 請填寫金額與項目'); return; }
    closeEditModal();
    document.getElementById('loading').style.display='flex';
    fetch(GAS_URL,{method:'POST',body:JSON.stringify(updated)})
        .then(function(){ return fetchData(); })
        .then(function(){ showToast('✅ 編輯已儲存！'); })
        .catch(function(){ showToast('⚠️ 儲存失敗'); document.getElementById('loading').style.display='none'; });
}
document.getElementById('edit-modal').addEventListener('click',function(e){ if(e.target===this) closeEditModal(); });

// ── Init ──
window.onload = function() {
    var today = getTodayStr();
    var first = getFirstDay(0);
    function sv(id,v){ var el=document.getElementById(id); if(el) el.value=v; }
    sv('date',today); sv('start-date',first); sv('end-date',today);
    sv('hist-start',first); sv('hist-end',today);
    initHistoryFilters();
    initCatFilterTags();
    updateOfflineBadge();
    fetchData();
};

// ── Page switch ──
function showPage(p) {
    document.querySelectorAll('div[id^="page-"]').forEach(function(x){ x.classList.add('hidden'); });
    document.querySelectorAll('nav button').forEach(function(b){ b.classList.remove('nav-active'); b.classList.add('text-gray-500'); });
    document.getElementById('page-'+p).classList.remove('hidden');
    var nb=document.getElementById('nav-'+p);
    nb.classList.add('nav-active'); nb.classList.remove('text-gray-500');
    if (p==='chart') renderChart();
    window.scrollTo(0,0);
}
function updateDisplay() {
    document.getElementById('display-user').innerText=document.getElementById('user').value;
    document.getElementById('display-type').innerText=document.getElementById('type').value;
}

// ── History filters ──
function initHistoryFilters() {
    var uc = document.getElementById('hist-user-tags');
    ALL_USERS.forEach(function(u){
        var t=document.createElement('span');
        t.className='chip'+(u==='全部'?' active':''); t.dataset.u=u; t.textContent=u;
        t.onclick=function(){ toggleHistUser(u); };
        uc.appendChild(t);
    });
    var cc = document.getElementById('hist-cat-tags');
    var allT=document.createElement('span');
    allT.className='chip active'; allT.dataset.c='__all__'; allT.textContent='全部';
    allT.onclick=function(){ toggleHistCat('__all__'); };
    cc.appendChild(allT);
    ALL_CATEGORIES.forEach(function(c){
        var t=document.createElement('span');
        t.className='chip'; t.dataset.c=c; t.textContent=c;
        t.onclick=function(){ toggleHistCat(c); };
        cc.appendChild(t);
    });
}
function toggleHistUser(u) {
    histSelectedUser=u;
    document.querySelectorAll('#hist-user-tags .chip').forEach(function(t){ t.classList.toggle('active',t.dataset.u===u); });
    renderHistory();
}
function toggleHistCat(c) {
    if(c==='__all__'){ histSelectedCats=[]; }
    else { var i=histSelectedCats.indexOf(c); if(i>=0) histSelectedCats.splice(i,1); else histSelectedCats.push(c); }
    document.querySelectorAll('#hist-cat-tags .chip').forEach(function(t){
        t.classList.toggle('active', t.dataset.c==='__all__' ? histSelectedCats.length===0 : histSelectedCats.indexOf(t.dataset.c)>=0);
    });
    renderHistory();
}
function resetHistFilter() {
    document.getElementById('hist-start').value=getFirstDay(0);
    document.getElementById('hist-end').value=getTodayStr();
    histSelectedUser='全部'; histSelectedCats=[];
    document.querySelectorAll('#hist-user-tags .chip').forEach(function(t){ t.classList.toggle('active',t.dataset.u==='全部'); });
    document.querySelectorAll('#hist-cat-tags .chip').forEach(function(t){ t.classList.toggle('active',t.dataset.c==='__all__'); });
    renderHistory();
}
function renderHistory() {
    var hs=document.getElementById('hist-start').value, he=document.getElementById('hist-end').value;
    var filtered=db.filter(function(it){
        var d=safeDate(it.date);
        if(hs&&d<hs) return false;
        if(he&&d>he) return false;
        if(histSelectedUser!=='全部'&&(it.user+it.type)!==histSelectedUser) return false;
        if(histSelectedCats.length>0&&histSelectedCats.indexOf(it.category)<0) return false;
        return true;
    });
    var list=document.getElementById('history-list');
    if(!filtered.length){ list.innerHTML='<p class="text-center text-stone-400 mt-10">該條件無紀錄</p>'; return; }
    var html='';
    filtered.forEach(function(it){
        html+='<div class="card p-4 flex justify-between items-center border-l-4 border-stone-200 font-bold text-sm">'+
            '<div class="flex-1 min-w-0 pr-2">'+
            '<p class="text-[10px] text-stone-400">'+safeDate(it.date)+' · '+it.user+it.type+'</p>'+
            '<p class="truncate">'+it.item+' <span class="text-[9px] font-normal text-stone-400">#'+it.category+'</span></p>'+
            '</div>'+
            '<div class="text-right flex-shrink-0">'+
            '<p class="text-stone-800">$'+Number(it.amount).toLocaleString()+'</p>'+
            '<div class="flex gap-2 justify-end mt-1">'+
            '<button onclick="openEditModal(\''+it.id+'\')" class="text-[10px] text-blue-400 underline font-normal">編輯</button>'+
            '<button onclick="deleteItem(\''+it.id+'\')" class="text-[10px] text-red-400 underline font-normal">刪除</button>'+
            '</div></div></div>';
    });
    list.innerHTML=html;
}

// ── Cat filter tags (Full Details) ──
function initCatFilterTags() {
    var container=document.getElementById('cat-filter-tags');
    var allT=document.createElement('span');
    allT.className='chip active'; allT.dataset.cat='__all__'; allT.textContent='全部';
    allT.onclick=function(){ toggleCatTag('__all__'); };
    container.appendChild(allT);
    ALL_CATEGORIES.forEach(function(cat){
        var t=document.createElement('span');
        t.className='chip'; t.dataset.cat=cat; t.textContent=cat;
        t.onclick=function(){ toggleCatTag(cat); };
        container.appendChild(t);
    });
}
function toggleCatTag(cat) {
    if(cat==='__all__'){ selectedCats=[]; }
    else { var i=selectedCats.indexOf(cat); if(i>=0) selectedCats.splice(i,1); else selectedCats.push(cat); }
    document.querySelectorAll('#cat-filter-tags .chip').forEach(function(t){
        t.classList.toggle('active', t.dataset.cat==='__all__' ? selectedCats.length===0 : selectedCats.indexOf(t.dataset.cat)>=0);
    });
    renderFullDetails();
}
function renderFullDetails() {
    var s=document.getElementById('start-date').value, e=document.getElementById('end-date').value;
    var filtered=db.filter(function(x){
        var d=safeDate(x.date);
        return d>=s&&d<=e&&(selectedCats.length===0||selectedCats.indexOf(x.category)>=0);
    }).sort(function(a,b){ var da=safeDate(a.date),db2=safeDate(b.date); return da<db2?1:da>db2?-1:0; });
    if(!filtered.length){ document.getElementById('full-detail-list').innerHTML='<p class="text-[10px] text-stone-400 italic text-center py-10">選定條件內無任何紀錄</p>'; return; }
    var html='';
    filtered.forEach(function(fi){
        html+='<div class="flex justify-between items-center bg-white/50 p-3 rounded-lg border border-stone-100 shadow-sm text-xs mb-2">'+
            '<div class="flex flex-col flex-1 min-w-0 pr-2">'+
            '<span class="text-[9px] text-stone-400 font-normal">'+safeDate(fi.date)+' · '+fi.user+fi.type+'</span>'+
            '<span class="text-stone-700 font-bold truncate">'+fi.item+'</span>'+
            '</div>'+
            '<div class="text-right flex-shrink-0">'+
            '<span class="text-stone-800 font-bold">$'+Number(fi.amount).toLocaleString()+'</span>'+
            '<div class="text-[9px] text-stone-400 font-normal">'+fi.category+'</div>'+
            '<button onclick="openEditModal(\''+fi.id+'\')" class="text-[9px] text-blue-400 underline font-normal">編輯</button>'+
            '</div></div>';
    });
    document.getElementById('full-detail-list').innerHTML=html;
}

// ── Big expenses ──
function toggleBigMore() { bigShowAll=!bigShowAll; renderBigList(); }
function renderBigList() {
    var shown=bigShowAll?bigAllItems:bigAllItems.slice(0,5);
    var html='';
    shown.forEach(function(bi){
        html+='<div class="flex justify-between text-[11px] py-2 border-b border-stone-100 font-bold italic">'+
            '<span class="text-stone-600">'+bi.item+' ('+bi.user+bi.type+')</span>'+
            '<span class="text-stone-800">$'+Number(bi.amount).toLocaleString()+'</span></div>';
    });
    document.getElementById('big-list').innerHTML=html||'<p class="text-[10px] text-stone-400 italic">期間內無大額支出</p>';
    var btn=document.getElementById('big-more-btn');
    if(bigAllItems.length>5){ btn.classList.remove('hidden'); btn.textContent=bigShowAll?'收起':'顯示更多（共'+bigAllItems.length+'筆）'; }
    else { btn.classList.add('hidden'); }
}

// ── Main chart ──
function renderChart() {
    var s=document.getElementById('start-date').value, e=document.getElementById('end-date').value;
    if(!s||!e) return;
    var filtered=db.filter(function(x){ var d=safeDate(x.date); return d>=s&&d<=e; });
    var stats={'倪家用':0,'倪個人':0,'光家用':0,'光個人':0};
    var cats={home:{},ni:{},guang:{}};
    var monthly={home:{},ni:{},guang:{}};
    filtered.forEach(function(it){
        var amt=Number(it.amount)||0, key=it.user+it.type;
        if(stats.hasOwnProperty(key)) stats[key]+=amt;
        if(it.type==='家用') cats.home[it.category]=(cats.home[it.category]||0)+amt;
        else if(it.user==='倪') cats.ni[it.category]=(cats.ni[it.category]||0)+amt;
        else if(it.user==='光') cats.guang[it.category]=(cats.guang[it.category]||0)+amt;
    });
    // monthly trend uses ALL db (not just range) for context, but filtered by year range
    db.forEach(function(it){
        var d=safeDate(it.date); if(!d) return;
        var ym=d.substring(0,7), amt=Number(it.amount)||0;
        if(it.type==='家用') monthly.home[ym]=(monthly.home[ym]||0)+amt;
        else if(it.user==='倪') monthly.ni[ym]=(monthly.ni[ym]||0)+amt;
        else if(it.user==='光') monthly.guang[ym]=(monthly.guang[ym]||0)+amt;
    });

    document.getElementById('stat-ni-home').innerText='$'+stats['倪家用'].toLocaleString();
    document.getElementById('stat-ni-self').innerText='$'+stats['倪個人'].toLocaleString();
    document.getElementById('stat-guang-home').innerText='$'+stats['光家用'].toLocaleString();
    document.getElementById('stat-guang-self').innerText='$'+stats['光個人'].toLocaleString();
    document.getElementById('stat-home-total').innerText='$'+(stats['倪家用']+stats['光家用']).toLocaleString();

    var palette=['#E07A5F','#3D405B','#81B29A','#F2CC8F','#9ead9d','#A69CAC','#E8A598','#8E9AAF','#C44536','#7785AC'];
    function genDoughnut(data){
        var labels=Object.keys(data),values=Object.values(data);
        return {type:'doughnut',data:{labels:labels.length?labels:['無資料'],datasets:[{data:values.length?values:[1],backgroundColor:labels.length?palette:['#f0f0f0'],borderWidth:2,borderColor:'#ffffff'}]},options:{maintainAspectRatio:false,animation:{duration:500},plugins:{legend:{display:labels.length>0,position:'right',labels:{color:'#4a4541',font:{size:9,weight:'700'},boxWidth:8}}}}};
    }
    ['home','ni','guang'].forEach(function(ck){
        var canvas=document.getElementById(ck+'Chart'); if(!canvas) return;
        if(charts[ck]) charts[ck].destroy();
        charts[ck]=new Chart(canvas.getContext('2d'),genDoughnut(cats[ck]));
    });

    // Trend: collect months in range
    var allMonths=Array.from(new Set(
        Object.keys(monthly.home).concat(Object.keys(monthly.ni)).concat(Object.keys(monthly.guang))
    )).filter(function(ym){ return ym>=s.substring(0,7)&&ym<=e.substring(0,7); }).sort();

    if(charts.trend) charts.trend.destroy();
    charts.trend=new Chart(document.getElementById('trendChart').getContext('2d'),{
        type:'line',
        data:{
            labels:allMonths.map(function(ym){ return ym.replace('-','/'); }),
            datasets:[
                {label:'家用',data:allMonths.map(function(m){ return monthly.home[m]||0; }),borderColor:'#81B29A',backgroundColor:'rgba(129,178,154,0.1)',tension:0.3,fill:true,pointRadius:4},
                {label:'倪個人',data:allMonths.map(function(m){ return monthly.ni[m]||0; }),borderColor:'#E07A5F',backgroundColor:'transparent',tension:0.3,fill:false,pointRadius:4},
                {label:'光個人',data:allMonths.map(function(m){ return monthly.guang[m]||0; }),borderColor:'#3D405B',backgroundColor:'transparent',tension:0.3,fill:false,pointRadius:4}
            ]
        },
        options:{
            maintainAspectRatio:false,animation:{duration:400},
            plugins:{legend:{position:'bottom',labels:{color:'#4a4541',font:{size:9,weight:'700'},boxWidth:10,padding:8}}},
            scales:{
                x:{ticks:{color:'#9a9088',font:{size:9}},grid:{display:false}},
                y:{ticks:{color:'#9a9088',font:{size:9},callback:function(v){ return '$'+(v>=1000?(v/1000).toFixed(0)+'k':v); }},grid:{color:'#f0ece8'}}
            }
        }
    });

    // Big expenses
    bigShowAll=false;
    bigAllItems=filtered.filter(function(i){ return Number(i.amount)>=1000; });
    bigAllItems.sort(function(a,b){ return Number(b.amount)-Number(a.amount); });
    renderBigList();
    renderFullDetails();
}
</script>
